site_name: "Bank Regulatory Data Dictionary"
site_description: "A catalogue and field-level mapping of the U.S. bank regulatory data universe — Federal Reserve, FFIEC, FDIC, NCUA, OCC and more."
site_url: https://github.com/andenick/bank-data-dictionary
repo_url: https://github.com/andenick/bank-data-dictionary
repo_name: andenick/bank-data-dictionary

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Guides intentionally link to ../csv/ and ../json/ data files that live in the repo
# but OUTSIDE docs_dir, so MkDocs cannot resolve them as documentation pages. Downgrade
# in-page link/anchor checks to INFO so `mkdocs build --strict` does not abort on them,
# while keeping nav validation strict (a bad nav entry still fails the build).
validation:
  links:
    not_found: info
    anchors: info

plugins:
  - search

# DataTables (CDN) powers the interactive tables on the "Data tables" pages.
extra_css:
  - https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css

extra_javascript:
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/2.1.8/js/dataTables.min.js

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Home:
      - Overview: index.md
      - Navigation Index: NAVIGATION.md
  - Overview:
      - Collections Catalog: COLLECTIONS_CATALOG.md
      - Coverage & Provenance: COVERAGE_PROVENANCE.md
